<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Space</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
      color: #f5f5f5;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 700px;
      padding: 40px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
      animation: fadeIn 1.5s ease;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    p {
      color: #bdbdbd;
      line-height: 1.6;
      font-size: 1.1rem;
    }

    a {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 24px;
      color: white;
      text-decoration: none;
      border: 1px solid #666;
      border-radius: 30px;
      transition: 0.3s;
    }

    a:hover {
      background: white;
      color: black;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome</h1>
    <p>
      This is FediWatch or I call it Fediverse watchlist. It's a public blocklist for admins to use
    </p>
    <a href="#">Explore</a>
  </div>
</body>
</html>
